b3_pipeline:
  target: prod
  outputs:
    prod:
      type: redshift
      method: database
      host: "{{ env_var('REDSHIFT_HOST') }}"
      port: 5439
      user: "{{ env_var('REDSHIFT_USER', 'admin') }}"
      password: "{{ env_var('REDSHIFT_PASSWORD') }}"
      dbname: dev
      schema: raw
      threads: 4
      ra3_node: true
